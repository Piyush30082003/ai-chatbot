<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(99,102,241,0.2);
      overflow: hidden;
    }
    .chat-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header h1 { font-size: 18px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.8; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .message.user {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: #252540;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.error { background: #3d1515; border: 1px solid #ef4444; }
    .typing {
      display: flex; gap: 6px; align-items: center;
      background: #252540; padding: 14px 18px;
      border-radius: 16px; border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #6366f1; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-8px); } }
    .chat-input-area {
      padding: 16px 24px;
      background: #13132b;
      display: flex;
      gap: 12px;
      border-top: 1px solid #2a2a4a;
    }
    #userInput {
      flex: 1;
      background: #252540;
      border: 1px solid #3a3a6a;
      color: #e0e0e0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border 0.2s;
    }
    #userInput:focus { border-color: #6366f1; }
    #sendBtn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      transition: opacity 0.2s;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    .reset-btn {
      background: transparent;
      border: 1px solid #3a3a6a;
      color: #8888aa;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-left: auto;
      margin-right: 24px;
      margin-top: 8px;
      display: block;
    }
    .reset-btn:hover { border-color: #6366f1; color: #6366f1; }
    .meta { font-size: 11px; color: #666; margin-top: 4px; text-align: right; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 2px; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <h1>AI Chatbot</h1>
      <p>Powered by OpenAI GPT-3.5</p>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      👋 Hello! I'm your AI assistant. Ask me anything and I'll do my best to help!
    </div>
  </div>

  <button class="reset-btn" onclick="resetChat()">🔄 Reset Conversation</button>

  <div class="chat-input-area">
    <textarea id="userInput" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
  let isLoading = false;

  function scrollToBottom() {
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMessage(text, type) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function showTyping() {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });
      const data = await res.json();
      hideTyping();

      if (res.ok) {
        addMessage(data.response, 'bot');
      } else {
        addMessage('⚠️ ' + (data.error || 'Something went wrong.'), 'error');
      }
    } catch (e) {
      hideTyping();
      addMessage('⚠️ Network error. Please try again.', 'error');
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }

  async function resetChat() {
    await fetch('/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '<div class="message bot">👋 Conversation reset! How can I help you?</div>';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Auto-resize textarea
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
